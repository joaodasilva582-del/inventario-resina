<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Inventário Spiltag</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#a51c30">

<!-- iOS / Tablet -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spiltag">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
/* (SEU CSS ORIGINAL INTEIRO - NÃO ALTERADO) */
:root { --border: #000; --header-bg: #e9e9e9; --accent: #a51c30; --btn-grey: #666666; --btn-blue: #0056b3; }
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

/* TELA DE LOGIN */
#login-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #f4f4f4; display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.login-box {
    background: white; padding: 30px; border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px;
    text-align: center; border-top: 6px solid var(--accent);
}
.login-box h1 { color: var(--accent); margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; font-weight: bold; }
.login-box p { font-size: 12px; color: #666; margin-bottom: 20px; font-weight: bold; }

.login-box input {
    width: 100%; padding: 12px; margin: 10px 0;
    border: 1px solid #aaa; border-radius: 6px;
    font-size: 16px;
}

.btn-login {
    width: 100%; padding: 14px; background-color: var(--accent);
    color: white; border: none; border-radius: 6px;
    font-weight: bold; font-size: 16px;
}

/* RESTANTE DO SEU CSS (mantido exatamente como você mandou) */
.container { width: 100%; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; min-width: 1000px; table-layout: fixed; }
th, td { border: 1px solid var(--border); padding: 4px 2px; text-align: center; word-wrap: break-word; }
.bg-grey { background-color: var(--header-bg); font-weight: bold; }
.bg-spiltag { background-color: var(--accent); color: white; font-weight: bold; }
.editable { background-color: #fffdec; border: 1px solid #ccc !important; }
input[type="number"], input[type="text"] { width: 95%; border: none; text-align: center; background: transparent; font-size: 13px; font-weight: bold; }
.res-val { font-weight: bold; font-size: 14px; }
.no-print { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 10px; }
.btn-pdf { padding: 10px 18px; border: 1px solid #000; background-color: var(--accent); color: white; font-weight: bold; border-radius: 4px; }
.btn-clear { padding: 10px 18px; border: 1px solid #000; background-color: var(--btn-grey); color: white; font-weight: bold; border-radius: 4px; }
.btn-email { padding: 10px 18px; border: 1px solid #000; background-color: var(--btn-blue); color: white; font-weight: bold; border-radius: 4px; }

/* ALERT */
#custom-alert {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    align-items: center; justify-content: center;
}
.alert-content {
    background: white; padding: 25px; border-radius: 10px;
    text-align: center; max-width: 400px; width: 85%;
    border-top: 8px solid var(--accent);
}
</style>
</head>

<body>

<!-- SEU HTML ORIGINAL INTEIRO (mantido) -->
<div id="custom-alert">
    <div class="alert-content">
        <h2 id="alert-title">Atenção!</h2>
        <p id="alert-msg"></p>
        <div id="alert-btns"></div>
    </div>
</div>

<div id="login-screen">
    <div class="login-box">
        <h1>SPILTAG</h1>
        <p>INVENTÁRIO DE RESINAS</p>
        <input type="text" id="user_in" placeholder="Usuário">
        <input type="password" id="pass_in" placeholder="Senha">
        <button class="btn-login" onclick="validarAcesso()">ENTRAR NO SISTEMA</button>
    </div>
</div>

<div id="app-content">
    <div class="no-print">
        <button class="btn-pdf" onclick="window.print()">IMPRIMIR PDF</button>
        <button class="btn-email" onclick="enviarEmail()">ENVIAR E-MAIL</button>
        <button class="btn-clear" onclick="confirmarLimpeza()">LIMPAR TUDO</button>
    </div>

    <div class="container">
        <table>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
// SERVICE WORKER (NOVO)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW OK'))
      .catch(err => console.log('SW erro', err));
  });
}

// =========================================
</script>

</body>
</html>
