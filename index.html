<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Inventário Spiltag</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#a51c30">

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Spiltag">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
:root { --border: #000; --header-bg: #e9e9e9; --accent: #a51c30; --btn-grey: #666666; --btn-blue: #0056b3; }
body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

/* LOGIN */
#login-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: #f4f4f4; display: flex; align-items: center; justify-content: center; z-index: 9999;
}
.login-box {
    background: white; padding: 30px; border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px;
    text-align: center; border-top: 6px solid var(--accent);
}
.login-box h1 { color: var(--accent); margin: 0 0 5px 0; font-size: 28px; letter-spacing: 2px; font-weight: bold; }
.login-box p { font-size: 12px; color: #666; margin-bottom: 20px; font-weight: bold; }

.login-box input {
    width: 100%; padding: 12px; margin: 10px 0;
    border: 1px solid #aaa; border-radius: 6px;
    font-size: 16px;
}

.btn-login {
    width: 100%; padding: 14px; background-color: var(--accent);
    color: white; border: none; border-radius: 6px;
    font-weight: bold; font-size: 16px;
}

/* APP */
#app-content { display: none; padding: 5px; background-color: #fff; }

.no-print { margin-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 10px; }

.btn-pdf, .btn-clear, .btn-email {
    padding: 10px 18px;
    border: 1px solid #000;
    color: white;
    font-weight: bold;
    border-radius: 4px;
}
.btn-pdf { background-color: var(--accent); }
.btn-clear { background-color: var(--btn-grey); }
.btn-email { background-color: var(--btn-blue); }

.container { width: 100%; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; min-width: 1000px; }
th, td { border: 1px solid var(--border); padding: 4px 2px; text-align: center; }

.bg-grey { background-color: var(--header-bg); font-weight: bold; }
.bg-spiltag { background-color: var(--accent); color: white; font-weight: bold; }

.editable { background-color: #fffdec; }
input[type="number"], input[type="text"] {
    width: 95%; border: none; text-align: center;
    background: transparent; font-size: 13px; font-weight: bold;
}

.res-val { font-weight: bold; }

/* ALERT */
#custom-alert {
    display: none; position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    align-items: center; justify-content: center;
}

.alert-content {
    background: white; padding: 25px;
    border-radius: 10px; text-align: center;
    max-width: 400px; width: 85%;
    border-top: 8px solid var(--accent);
}

.btn-alert-ok, .btn-alert-cancel {
    padding: 12px 25px;
    border-radius: 5px;
    color: white;
    border: none;
    font-weight: bold;
}
.btn-alert-ok { background: var(--accent); }
.btn-alert-cancel { background: var(--btn-grey); }

@media print {
    .no-print, #login-screen, #custom-alert { display: none !important; }
}
</style>
</head>

<body>

<div id="custom-alert">
    <div class="alert-content">
        <h2 id="alert-title">Atenção!</h2>
        <p id="alert-msg"></p>
        <div id="alert-btns"></div>
    </div>
</div>

<div id="login-screen">
    <div class="login-box">
        <h1>SPILTAG</h1>
        <p>INVENTÁRIO DE RESINAS</p>
        <input type="text" id="user_in" placeholder="Usuário">
        <input type="password" id="pass_in" placeholder="Senha">
        <button class="btn-login" onclick="validarAcesso()">ENTRAR</button>
    </div>
</div>

<div id="app-content">
    <div class="no-print">
        <button class="btn-pdf" onclick="window.print()">PDF</button>
        <button class="btn-email" onclick="enviarEmail()">EMAIL</button>
        <button class="btn-clear" onclick="confirmarLimpeza()">LIMPAR</button>
    </div>

    <div class="container">
        <table>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
// SERVICE WORKER
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
    });
}

// LOGIN
function validarAcesso(){
    if(document.getElementById('user_in').value==="producao" &&
       document.getElementById('pass_in').value==="Spil@2026"){
        document.getElementById('login-screen').style.display="none";
        document.getElementById('app-content').style.display="block";
        render();
    } else {
        alert("Acesso negado");
    }
}

// TABELA SIMPLES (mantive base)
function render(){
    let html="";
    for(let i=0;i<10;i++){
        html+=`<tr>
            <td>Linha ${i+1}</td>
            <td><input type="number"></td>
        </tr>`;
    }
    document.getElementById("table-body").innerHTML=html;
}

// ALERTA
function confirmarLimpeza(){
    if(confirm("Limpar tudo?")) location.reload();
}

// EMAIL
function enviarEmail(){
    window.location.href="mailto:joao.pedroso@spiltag.com";
}
</script>

</body>
</html>
